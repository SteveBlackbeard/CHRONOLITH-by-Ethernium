name: CHRONOLITH Validation & Release

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]

jobs:
  validate-chronolith:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Chronolith Cycle
        run: |
          cd "CHRONOLITH Pro"
          python tools/chronolith/run_chronolith_cycle.py --repo-root . --strict

  pypi-release:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate-chronolith
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Build Packages
        run: |
          python -m pip install --upgrade build
          cd chronolith-legacy-pypi
          python -m build
          cd ../chronolith-legacy-lite-pypi
          python -m build
          cd ..

      - name: Publish PRO to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: chronolith-legacy-pypi/dist/

      - name: Publish LITE to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: chronolith-legacy-lite-pypi/dist/
