name: CONTINUITY LEGACY Validation

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-editions:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        edition: [continuity-lite, continuity-pro, continuity-omega]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          cd ${{ matrix.edition }}
          pip install -e .

      - name: Run Tests
        run: |
          cd ${{ matrix.edition }}
          pytest tests/

  lint-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Linting Tools
        run: |
          pip install flake8

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. 127 chars max line length.
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
