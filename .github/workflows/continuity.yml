name: CONTINUITY LEGACY Validation & Release

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]

jobs:
  validate-continuity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Continuity Legacy Cycle
        run: |
          cd "CONTINUITY LEGACY Pro"
          python tools/continuity_legacy/run_continuity_cycle.py --repo-root . --strict

  pypi-release:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate-continuity
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Build Packages (Pro, Lite & Omega)
        run: |
          python -m pip install --upgrade build
          # Build Pro
          cd "CONTINUITY LEGACY Pro"
          python -m build
          cd ..
          # Build Lite
          cd "CONTINUITY LEGACY Lite"
          python -m build
          cd ..
          # Build Omega
          cd "CONTINUITY LEGACY Omega"
          python -m build
          cd ..

      - name: Publish Pro Version
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: "CONTINUITY LEGACY Pro/dist/"

      - name: Publish Lite Version
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: "CONTINUITY LEGACY Lite/dist/"

      - name: Publish Omega Version
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: "CONTINUITY LEGACY Omega/dist/"
